<th:block th:fragment="sectionList(sections)" xmlns:th="http://www.thymeleaf.org">
  <section class="module">
    <div class="module__header">
      <h2 class="module__title">섹션</h2>
      <span class="status-badge" th:text="${sections.size() + ' sections'}">0 sections</span>
    </div>
    <div class="section-list">
      <a class="section-list__item"
         th:each="section : ${sections}"
         th:href="@{/sections/{slug}(slug=${section.slug})}">
        <strong th:text="${section.title}">섹션</strong>
        <span th:text="${section.summary}">요약</span>
      </a>
    </div>
  </section>
</th:block>

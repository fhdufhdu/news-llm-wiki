<article class="article-item" th:fragment="articleItem(item)" xmlns:th="http://www.thymeleaf.org">
  <a class="article-item__title" th:href="@{/articles/{id}(id=${item.id})}" th:text="${item.title}">기사 제목</a>
  <div class="meta-row">
    <span th:if="${item.publishedAt != ''}" th:text="${item.publishedAt}">발행 시각</span>
    <span class="status-badge" th:text="${item.durability}">durable</span>
  </div>
  <p class="summary-text" th:text="${item.summary}">AI 요약</p>
  <div class="meta-row" th:if="${!item.chips.isEmpty()}">
    <span class="chip chip--topic" th:each="chip : ${item.chips}" th:text="${chip}">topic</span>
  </div>
</article>

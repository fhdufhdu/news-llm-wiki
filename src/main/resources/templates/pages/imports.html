<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::content}, pageTitle='기사 가져오기 - News Wiki')}">
<body>
<th:block th:fragment="content">
  <div class="page-grid">
    <section>
      <h1 class="page-title">기사 가져오기</h1>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">URL 입력</h2>
        </div>
        <form class="article-item" method="post" th:action="@{/imports}">
          <textarea class="url-import-textarea" name="urls" rows="12"
                    placeholder="기사 URL을 한 줄에 하나씩 입력하세요"></textarea>
          <div class="job-actions">
            <button class="command-button" type="submit">가져오기 시작</button>
          </div>
        </form>
      </section>

      <section class="module">
        <div class="module__header">
          <h2 class="module__title">최근 가져오기</h2>
        </div>
        <div class="article-item" th:if="${#lists.isEmpty(jobs)}">
          <p class="summary-text">아직 가져오기 작업이 없습니다.</p>
        </div>
        <article class="article-item" th:each="job : ${jobs}">
          <span class="status-badge" th:text="${job.status}">STATUS</span>
          <a class="article-item__title" th:href="@{/imports/{id}(id=${job.id})}"
             th:text="${'URL ' + job.totalCount + '개'}">URL 0개</a>
          <div class="meta-row">
            <span th:text="${'원문 ' + job.fetchedCount + '개'}">원문 0개</span>
            <span th:text="${'위키 ' + job.wikiDoneCount + '개'}">위키 0개</span>
            <span th:text="${'실패 ' + job.failedCount + '개'}">실패 0개</span>
          </div>
          <p class="summary-text" th:text="${job.lastMessage}">message</p>
        </article>
      </section>
    </section>
  </div>
</th:block>
</body>
</html>

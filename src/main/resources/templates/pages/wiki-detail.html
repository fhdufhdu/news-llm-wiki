<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::content}, pageTitle='위키 - News Wiki')}">
<body>
<th:block th:fragment="content">
  <div class="page-grid">
    <section>
      <h1 class="page-title" th:text="${topic != null ? topic.title : '위키'}">위키</h1>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">지식 베이스</h2>
          <span class="status-badge" th:text="${topics.size() + ' topics'}">0 topics</span>
        </div>
        <div class="article-item" th:if="${topic != null}">
          <p class="summary-text" th:text="${topic.summary}">토픽 요약</p>
          <div class="meta-row">
            <span th:text="${topic.articleCount + ' sources'}">0 sources</span>
            <span th:text="${topic.updatedAt}">updated</span>
          </div>
        </div>
        <div class="article-item" th:each="item : ${topics}">
          <a class="article-item__title" th:href="@{/topics/{slug}(slug=${item.slug})}" th:text="${item.title}">토픽</a>
          <div class="meta-row">
            <span th:text="${item.articleCount + ' sources'}">0 sources</span>
            <span th:text="${item.updatedAt}">updated</span>
          </div>
          <p class="summary-text" th:text="${item.summary}">요약</p>
        </div>
      </section>
    </section>
  </div>
</th:block>
</body>
</html>

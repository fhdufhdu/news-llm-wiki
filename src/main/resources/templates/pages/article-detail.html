<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::content}, pageTitle='기사 - News Wiki')}">
<body>
<th:block th:fragment="content">
  <div class="page-grid">
    <section>
      <h1 class="page-title" th:text="${article.title}">기사</h1>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title" th:text="${article.providerName}">제공사</h2>
          <span class="status-badge" th:text="${article.wikiStatus}">WIKI</span>
        </div>
        <div class="article-item">
          <div class="meta-row">
            <span th:text="${article.publishedAt}">발행 시각</span>
            <span th:text="${article.ingestedAt}">수집 시각</span>
          </div>
          <p class="summary-text" th:text="${'원문 수집 상태: ' + article.rawStatus}">raw status</p>
          <p class="summary-text" th:text="${'위키 처리 상태: ' + article.wikiStatus}">wiki status</p>
          <a class="article-item__title" th:href="${article.canonicalUrl}" target="_blank" rel="noreferrer">원문 열기</a>
        </div>
      </section>
    </section>
  </div>
</th:block>
</body>
</html>

<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::content}, pageTitle='News Wiki')}">
<body>
<th:block th:fragment="content">
  <div class="page-grid">
    <section>
      <h1 class="page-title" th:text="${view.title}">오늘의 뉴스</h1>
      <section class="frontpage-summary">
        <div class="meta-row">
          <span th:text="${todaySummary.wikiPageCount + '개 오늘 위키'}">0개 오늘 위키</span>
          <span th:text="${todaySummary.articleCount + '개 기사'}">0개 기사</span>
          <span th:text="${todaySummary.updatedAt.isBlank() ? view.generatedAt : todaySummary.updatedAt}">생성 대기</span>
        </div>
        <p class="summary-text" th:text="${todaySummary.summary}">오늘의 요약</p>
      </section>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">오늘의 요약</h2>
          <span class="status-badge" th:text="${todaySummary.date}">today</span>
        </div>
        <div class="wiki-page-list">
          <article class="article-item" th:each="highlight : ${todaySummary.highlights}">
            <p class="summary-text" th:text="${highlight}">주요 흐름</p>
          </article>
          <div class="article-item" th:if="${todaySummary.highlights.isEmpty()}">
            <p class="summary-text">AI가 오늘자 위키 데이터를 기준으로 오늘의 요약을 생성하면 여기에 표시됩니다.</p>
          </div>
        </div>
      </section>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">최근 갱신된 위키</h2>
        </div>
        <div class="wiki-page-list">
          <article class="wiki-page-card" th:each="page : ${pages}">
            <a class="wiki-page-card__title" th:href="@{/wiki/{slug}(slug=${page.slug})}" th:text="${page.title}">위키 문서</a>
            <p class="summary-text" th:text="${page.summary}">요약</p>
            <div class="meta-row">
              <span th:text="${'중요도 ' + page.importance}">중요도</span>
              <span th:text="${page.updatedAt}">updated</span>
            </div>
          </article>
          <div class="article-item" th:if="${pages.isEmpty()}">
            <p class="summary-text">아직 위키 문서가 없습니다. 기사 URL을 가져온 뒤 위키 작업이 완료되면 여기에 표시됩니다.</p>
          </div>
        </div>
      </section>
    </section>
    <aside>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">작업 상태</h2>
        </div>
        <div class="article-item">
          <span class="status-badge">WIKI</span>
          <p class="summary-text">원본 수집은 서버가 수행하고, 위키 데이터 생성은 Codex가 SQLite에 직접 기록합니다.</p>
        </div>
      </section>
      <th:block th:replace="~{fragments/category-list :: categoryList(${categories})}"></th:block>
    </aside>
  </div>
</th:block>
</body>
</html>

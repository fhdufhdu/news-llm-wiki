<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::content}, pageTitle='제공사 - News Wiki')}">
<body>
<th:block th:fragment="content">
  <div class="page-grid">
    <section>
      <h1 class="page-title">제공사</h1>
      <section class="module">
        <div class="module__header">
          <h2 class="module__title">등록된 제공사</h2>
        </div>
        <article class="article-item" th:each="provider : ${providers}">
          <a class="article-item__title" th:href="@{'/providers/' + ${provider.slug}}" th:text="${provider.name}">제공사</a>
          <div class="meta-row">
            <span th:text="${provider.slug}">slug</span>
            <span th:text="${provider.homepageUrl}">homepage</span>
          </div>
          <p class="summary-text" th:text="${provider.description}">설명</p>
        </article>
      </section>
    </section>
  </div>
</th:block>
</body>
</html>
